name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: rust:1.85-slim
      options: --network host
    steps:
      - name: Install deps
        run: |
          sed -i 's|deb.debian.org|mirrors.ustc.edu.cn|g' /etc/apt/sources.list.d/debian.sources
          apt-get update -qq && apt-get install -y -qq git curl

      - name: Fetch code
        run: |
          curl -sSL \
            -H "Authorization: token ${{ gitea.token }}" \
            "${{ gitea.server_url }}/api/v1/repos/${{ gitea.repository }}/archive/${{ gitea.sha }}.tar.gz" \
            | tar xz --strip-components=1

      - name: Push mirror to GitHub (best-effort)
        run: |
          git config --global user.name "xiao-zhu team"
          git config --global user.email "team@xiaozhu-tec.cloud"

          GH_URL="https://x-access-token:${{ secrets.GH_PAT }}@github.com/xiaozhu-eco/xz-modules.git"
          GITEA_URL="http://x-access-token:${{ gitea.token }}@gitea:3000/xiaozhu/xz-modules.git"

          # Clone from Gitea and push to GitHub (may fail due to GFW)
          git clone --bare "$GITEA_URL" /tmp/xz-modules-mirror && \
          cd /tmp/xz-modules-mirror && \
          git push --mirror "$GH_URL" || \
          echo "⚠️ GitHub mirror push skipped (network unavailable)"

      - name: Publish to crates.io
        if: startsWith(gitea.ref, 'refs/tags/')
        run: |
          set -e
          FAILED=""

          publish_crate() {
            echo "::group::Publishing $1"
            output=$(cargo publish -p "$1" --token "$CARGO_TOKEN" 2>&1) && rc=$? || rc=$?
            echo "$output"
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then
              if echo "$output" | grep -q "already exists"; then
                echo "⏭️ $1 already published, skipping"
              else
                echo "❌ $1 failed to publish"
                FAILED="$FAILED $1"
              fi
            fi
            sleep 90
          }

          # Layer 0: no internal dependencies
          publish_crate xz-provider
          publish_crate xz-embed
          publish_crate xz-search
          publish_crate xz-rerank
          publish_crate xz-knowledge-graph

          # Layer 1: depends on layer 0
          publish_crate xz-memory
          publish_crate xz-skill

          # Layer 2: depends on layer 0-1
          publish_crate xz-rag
          publish_crate xz-agent

          if [ -n "$FAILED" ]; then
            echo "The following crates failed: $FAILED"
            exit 1
          fi
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_IO_TOKEN }}
