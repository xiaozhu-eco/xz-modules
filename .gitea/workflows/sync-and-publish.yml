name: Sync & Publish
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: rust:1.85-slim
    steps:
      - name: Install deps
        run: apt-get update -qq && apt-get install -y -qq git

      - name: Sync crates from Gitea
        run: |
          GITEA="https://gitea.geomaster.cn/xiaozhu"
          
          sync_crate() {
            echo "::group::Syncing $1"
            rm -rf "$1"
            git clone --depth 1 "${GITEA}/$1.git" "$1" 2>/dev/null || {
              echo "⚠️ Failed to clone $1"
              return 0
            }
            rm -rf "$1/.git" "$1/.gitignore"
            echo "::endgroup::"
          }

          sync_crate xz-provider
          sync_crate xz-embed
          sync_crate xz-search
          sync_crate xz-rerank
          sync_crate xz-knowledge-graph
          sync_crate xz-memory
          sync_crate xz-skill
          sync_crate xz-rag
          sync_crate xz-agent

      - name: Commit changes
        run: |
          git config user.name "xiao-zhu team"
          git config user.email "team@xiaozhu-tec.cloud"
          git checkout main 2>/dev/null || git checkout -b main
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "sync: update crates to ${GITHUB_REF#refs/tags/}"
          fi

      - name: Push sync to GitHub
        run: |
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/xiaozhu-eco/xz-modules.git main 2>/dev/null || true
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/xiaozhu-eco/xz-modules.git "${GITHUB_REF#refs/tags/}" 2>/dev/null || true

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          FAILED=""
          
          publish_crate() {
            echo "::group::Publishing $1"
            output=$(cargo publish -p "$1" --token "$CARGO_TOKEN" 2>&1) && rc=$? || rc=$?
            echo "$output"
            echo "::endgroup::"
            if [ $rc -ne 0 ]; then
              if echo "$output" | grep -q "already exists"; then
                echo "⏭️ $1 already published"
              else
                echo "❌ $1 failed"
                FAILED="$FAILED $1"
              fi
            fi
            sleep 90
          }

          publish_crate xz-provider
          publish_crate xz-embed
          publish_crate xz-search
          publish_crate xz-rerank
          publish_crate xz-knowledge-graph
          publish_crate xz-memory
          publish_crate xz-skill
          publish_crate xz-rag
          publish_crate xz-agent

          [ -n "$FAILED" ] && echo "Failed: $FAILED" && exit 1 || true
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_IO_TOKEN }}
