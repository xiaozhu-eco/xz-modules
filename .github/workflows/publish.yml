name: Publish to crates.io
on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish All Crates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish crates (with rate-limit delays)
        run: |
          # crates.io rate limit: ~1 new crate per minute
          # Publish in dependency-topological order
          set -e

          publish_crate() {
            echo "::group::Publishing $1"
            cargo publish -p "$1" --token "$CARGO_TOKEN"
            echo "::endgroup::"
            sleep 90  # Wait 90 seconds between publishes
          }

          # Layer 0: no internal deps
          publish_crate xz-provider
          publish_crate xz-embed
          publish_crate xz-search
          publish_crate xz-rerank
          publish_crate xz-knowledge-graph

          # Layer 1: depends on layer 0
          publish_crate xz-memory
          publish_crate xz-skill

          # Layer 2: depends on layer 0-1
          publish_crate xz-rag
          publish_crate xz-agent
        env:
          CARGO_TOKEN: ${{ secrets.CARGO_IO_TOKEN }}
